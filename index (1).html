<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ElectroLearn — Adaptive Electronics Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ============================================
     ELECTROLEARN — GLOBAL STYLES & CSS VARIABLES
     ============================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #131d2e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f4ff;
    --text2: #8899bb;
    --text3: #4a5568;
    --green: #00e676;
    --yellow: #ffd600;
    --red: #ff1744;
    --purple: #d500f9;
    --radius: 16px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --glow: 0 0 20px rgba(0,229,255,0.3);
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
    --sidebar: 260px;
  }

  [data-theme="light"] {
    --bg: #f0f4ff;
    --bg2: #e8edf8;
    --bg3: #dde4f5;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #0a1128;
    --text2: #4a5568;
    --text3: #8899bb;
    --shadow: 0 8px 32px rgba(0,0,0,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ============================================
     ANIMATIONS
     ============================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
    50%       { box-shadow: 0 0 0 12px rgba(0,229,255,0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); } to { transform: rotate(360deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 4px var(--accent)); }
    50%       { filter: drop-shadow(0 0 16px var(--accent)); }
  }
  @keyframes streak {
    0%   { transform: translateX(-100%) skewX(-15deg); }
    100% { transform: translateX(400%) skewX(-15deg); }
  }

  .anim-fadeup { animation: fadeUp 0.5s ease forwards; }
  .anim-fadein { animation: fadeIn 0.4s ease forwards; }
  .anim-slide  { animation: slideIn 0.35s ease forwards; }

  /* ============================================
     LAYOUT
     ============================================ */
  .app-shell {
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s ease;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    animation: glow-pulse 3s ease infinite;
  }
  .logo-text {
    font-family: var(--font-head);
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 12px 8px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    text-decoration: none;
    position: relative;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; border-radius: 2px;
    background: var(--accent);
  }
  .nav-icon { font-size: 18px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: var(--bg);
    font-size: 10px; font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    cursor: pointer;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-level { font-size: 11px; color: var(--text2); }

  /* MAIN CONTENT */
  .main-content {
    margin-left: var(--sidebar);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    height: 64px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px;
    gap: 16px;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
  }
  .topbar-title {
    font-family: var(--font-head);
    font-size: 18px; font-weight: 700;
    flex: 1;
  }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .page-content {
    flex: 1;
    padding: 28px;
    animation: fadeUp 0.4s ease forwards;
  }

  /* ============================================
     CARDS & COMPONENTS
     ============================================ */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .card-sm { padding: 16px; }
  .card-accent { border-color: rgba(0,229,255,0.3); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.2s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(0,229,255,0.4); }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg2); border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: var(--red); color: white; }
  .btn-lg { padding: 14px 28px; font-size: 16px; border-radius: var(--radius); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-icon { padding: 10px; border-radius: var(--radius-sm); background: var(--bg3); border: 1px solid var(--border); cursor: pointer; font-size: 18px; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--bg3);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    transition: width 0.8s ease;
    position: relative;
    overflow: hidden;
  }
  .progress-fill::after {
    content: '';
    position: absolute; top: 0; bottom: 0; left: -100%;
    width: 60%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: streak 2s ease infinite;
  }

  /* BADGE */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-green  { background: rgba(0,230,118,0.15); color: var(--green); }
  .badge-yellow { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .badge-red    { background: rgba(255,23,68,0.15); color: var(--red); }
  .badge-accent { background: rgba(0,229,255,0.15); color: var(--accent); }
  .badge-purple { background: rgba(213,0,249,0.15); color: var(--purple); }
  .badge-orange { background: rgba(255,107,53,0.15); color: var(--accent2); }

  /* INPUT */
  .input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
  .input::placeholder { color: var(--text3); }

  .label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group { margin-bottom: 20px; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* TAG */
  .tag {
    display: inline-flex; align-items: center;
    padding: 4px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px; color: var(--text2);
  }

  /* TOOLTIP */
  .tip {
    font-size: 13px; color: var(--text2); line-height: 1.6;
  }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: 20px; font-weight: 700;
  }

  /* STAT CARD */
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 32px; font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 13px; color: var(--text2); }
  .stat-icon {
    position: absolute; top: 16px; right: 16px;
    font-size: 28px; opacity: 0.2;
  }

  /* QUIZ */
  .quiz-option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .quiz-option:hover { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .quiz-option.correct { border-color: var(--green); background: rgba(0,230,118,0.1); color: var(--green); }
  .quiz-option.wrong   { border-color: var(--red);   background: rgba(255,23,68,0.1);  color: var(--red); }
  .quiz-option.selected { border-color: var(--accent); background: rgba(0,229,255,0.08); }

  /* LEADERBOARD */
  .rank-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
  }
  .rank-row:hover { background: var(--bg3); }
  .rank-row.me { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); }
  .rank-num {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 700;
    color: var(--text3);
    width: 28px; text-align: center;
  }
  .rank-num.gold   { color: #ffd700; }
  .rank-num.silver { color: #c0c0c0; }
  .rank-num.bronze { color: #cd7f32; }

  /* DISCUSSION */
  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .post-card:hover { border-color: rgba(0,229,255,0.2); }
  .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .post-meta { font-size: 12px; color: var(--text3); }
  .post-actions { display: flex; gap: 12px; margin-top: 12px; }
  .post-action-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2);
    background: none; border: none; cursor: pointer;
    padding: 4px 8px; border-radius: 4px;
    transition: all 0.2s;
  }
  .post-action-btn:hover { color: var(--accent); background: rgba(0,229,255,0.06); }

  /* PROJECT CARD */
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .project-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .project-thumb {
    height: 160px;
    background: linear-gradient(135deg, var(--bg3), var(--bg2));
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    position: relative; overflow: hidden;
  }
  .project-thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.5));
  }
  .project-body { padding: 16px; }

  /* TOOL CARD */
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }
  .tool-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,229,255,0.1); }
  .tool-thumb {
    height: 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    background: var(--bg3);
  }
  .tool-body { padding: 16px; }

  /* AUTH PAGE */
  .auth-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .auth-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,229,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(213,0,249,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .auth-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; opacity: 0.4;
  }
  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    width: 100%; max-width: 460px;
    position: relative; z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease forwards;
  }
  .auth-logo {
    text-align: center; margin-bottom: 32px;
  }
  .auth-logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    animation: pulse 2s infinite;
  }
  .auth-title {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 800;
    margin-bottom: 6px;
  }
  .auth-sub { font-size: 14px; color: var(--text2); }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text2); }
  .auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; }
  .auth-switch span:hover { text-decoration: underline; }

  /* ONBOARDING */
  .onboard-step {
    animation: fadeUp 0.4s ease forwards;
  }
  .choice-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px; margin-top: 12px;
  }
  .choice-btn {
    padding: 16px 12px;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer; text-align: center;
    transition: all 0.2s; font-size: 14px; font-weight: 500;
    color: var(--text); font-family: var(--font-body);
  }
  .choice-btn:hover  { border-color: var(--accent); }
  .choice-btn.active { border-color: var(--accent); background: rgba(0,229,255,0.1); color: var(--accent); }
  .choice-icon { font-size: 32px; margin-bottom: 8px; }

  /* SESSION PAGE */
  .session-header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .session-header::before {
    content: '';
    position: absolute; top: -50%; right: -10%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,229,255,0.1), transparent 70%);
    border-radius: 50%;
  }
  .session-number {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .session-title {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 800;
    margin-bottom: 12px;
  }

  /* CONCEPT BOX */
  .concept-box {
    background: var(--bg3);
    border-left: 4px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 20px;
    margin: 20px 0;
    font-size: 15px; line-height: 1.7;
  }
  .formula-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--accent);
    text-align: center;
    margin: 16px 0;
    letter-spacing: 1px;
  }
  .activity-box {
    background: rgba(0,230,118,0.05);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: var(--radius);
    padding: 20px;
    margin: 20px 0;
  }
  .activity-title {
    font-family: var(--font-head);
    font-size: 15px; font-weight: 700;
    color: var(--green);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  /* THEME PICKER */
  .color-swatch {
    width: 36px; height: 36px;

  { n:22, cat:"Components", title:"Operational Amplifiers",                   diff:"Advanced", time:35, emoji:"📈",
    concept:"An Op-Amp is a high-gain differential amplifier. It amplifies the difference between two inputs (V+ and V-). With negative feedback, we can create precise amplifiers, comparators, filters, and integrators. The 741 and LM358 are classic op-amp ICs.",

  { n:23, cat:"Components", title:"555 Timer IC",                              diff:"Intermediate", time:30, emoji:"⏱️",
    concept:"The 555 timer is one of the most popular ICs ever made. It can operate as: Astable (oscillator), Monostable (one-shot pulse), or Bistable (flip-flop). Used in clocks, PWM, alarms, LED flashers, and tone generators.",

    quiz:{ q:"555 in astable mode acts as:", opts:["Amplifier","Switch","Oscillator","Rectifier"], ans:2 }},
  { n:24, cat:"Components", title:"Voltage Regulators",                       diff:"Intermediate", time:25, emoji:"🎛️",
    concept:"Voltage regulators maintain constant output voltage regardless of input variations or load changes. Linear regulators (7805 → 5V, 7812 → 12V) are simple but inefficient. Switching regulators (buck, boost) are efficient for battery-powered devices.",

    quiz:{ q:"7805 voltage regulator outputs:", opts:["3.3V","5V","9V","12V"], ans:1 }},
  { n:25, cat:"Components", title:"Relays",                                    diff:"Intermediate", time:25, emoji:"🔀",
    concept:"A relay is an electrically operated mechanical switch. A small control circuit energizes a coil, which moves a metal arm to switch a high-power circuit. Used to control AC appliances with low-power DC circuits. Always use a flyback diode to protect from voltage spikes.",

    quiz:{ q:"A flyback diode in a relay circuit protects against:", opts:["Short circuit","Voltage spikes","Low current","Heat"], ans:1 }},
  { n:26, cat:"Components", title:"Inductors & Coils",                        diff:"Intermediate", time:25, emoji:"🌀",
    concept:"Inductors store energy as magnetic fields. They resist sudden changes in current (filtering). In power supplies, inductors smooth current ripple. In RF circuits, they form resonant tanks with capacitors. Values in microhenrys (μH) to millihenrys (mH).",
    formula:"X_L = 2πfL  (Inductive reactance)",

    quiz:{ q:"Inductors are commonly used for:", opts:["Storing charge","Filtering current ripple","Amplifying signals","Generating light"], ans:1 }},
  { n:27, cat:"Components", title:"Zener Diodes",                             diff:"Intermediate", time:20, emoji:"↩️",
    concept:"A Zener diode is designed to operate in reverse breakdown at a specific voltage (Zener voltage). It's used as a voltage reference, overvoltage protection, and simple voltage regulator. Unlike regular diodes, Zeners are safe to use in reverse breakdown.",
    formula:"V_z = constant (e.g., 5.1V for 1N4733A)",
    activity:"Build a 5.1V Zener voltage regulator. Test it with varying input voltages from 7V to 12V. Measure output.",
    quiz:{ q:"Zener diodes are designed for use in:", opts:["Forward bias only","Reverse breakdown","AC circuits","High frequency"], ans:1 }},
  { n:28, cat:"Components", title:"Photoresistors & LDRs",                    diff:"Beginner", time:20, emoji:"🌞",
    concept:"A Light Dependent Resistor (LDR/photoresistor) changes resistance based on light intensity. In darkness: high resistance (megaohms). In bright light: low resistance (hundreds of ohms). Used in automatic lights, camera exposure sensors, and light-following robots.",
    formula:"R_dark / R_light ratio typically > 1000:1",
    activity:"Build an automatic night lamp: LDR + transistor + LED. LED turns on in darkness, off in light.",
    quiz:{ q:"An LDR in bright light has:", opts:["High resistance","Low resistance","Zero resistance","Infinite resistance"], ans:1 }},
  { n:29, cat:"Components", title:"Thermistors",                              diff:"Beginner", time:20, emoji:"🌡️",
    concept:"A thermistor is a resistor that changes with temperature. NTC (Negative Temperature Coefficient): resistance decreases as temperature rises—used in temperature measurement. PTC (Positive Temperature Coefficient): resistance increases with temperature—used as self-resetting fuses.",
    formula:"R(T) = R₀ × e^(B(1/T - 1/T₀)) [NTC Steinhart equation]",

    quiz:{ q:"NTC thermistor stands for:", opts:["Normal Temperature Control","Negative Temperature Coefficient","Neutral Thermal Component","New Technology Component"], ans:1 }},
  { n:30, cat:"Components", title:"Crystal Oscillators",                      diff:"Advanced", time:25, emoji:"💎",
    concept:"Crystal oscillators use the piezoelectric effect of quartz crystals to create very accurate clock signals. The crystal mechanically vibrates at a precise frequency. Used in clocks, microcontrollers, GPS, and communication systems.",
    formula:"f_resonance = (1/2π) × √(1/LC) [LC equivalent of crystal]",

    quiz:{ q:"Crystal oscillators use which property of quartz?", opts:["Magnetic","Piezoelectric","Optical","Thermal"], ans:1 }},
  { n:31, cat:"Components", title:"DC Motors",                                diff:"Beginner", time:20, emoji:"⚙️",
    concept:"DC motors convert electrical energy to rotational mechanical energy. Speed is proportional to voltage. Torque is proportional to current. Use PWM (Pulse Width Modulation) to control speed. H-bridge ICs like L298N let you reverse motor direction.",

  { n:32, cat:"Components", title:"Servo Motors",                             diff:"Intermediate", time:25, emoji:"🎯",
    concept:"Servo motors provide precise angular position control. They have built-in feedback (encoder or potentiometer). RC servos rotate 0°-180° based on PWM pulse width. Used in robotics, CNC, camera gimbals, and steering systems.",

  { n:33, cat:"Components", title:"Stepper Motors",                           diff:"Advanced", time:30, emoji:"🔩",
    concept:"Stepper motors move in precise steps (1.8° per step typically). They don't need encoders for position—each step is counted. Used in 3D printers, CNC machines, telescopes. Driven by step sequences using driver ICs like A4988 or DRV8825.",

  { n:35, cat:"Circuits", title:"Voltage Dividers",                           diff:"Beginner", time:20, emoji:"÷",
    concept:"A voltage divider uses two resistors in series to produce a fraction of the supply voltage. Used to scale down voltages, create reference voltages, and interface sensors (like LDR/thermistor) with microcontrollers.",

  { n:36, cat:"Circuits", title:"RC Timing Circuits",                         diff:"Intermediate", time:25, emoji:"⏲️",
    concept:"RC circuits use a resistor and capacitor to create time delays. The time constant τ (tau) = R×C. After one τ, capacitor charges to 63.2% of supply voltage. After 5τ, it's essentially fully charged. Used in debouncing, timer circuits, and filters.",

  { n:37, cat:"Circuits", title:"Low Pass Filters",                           diff:"Intermediate", time:25, emoji:"🔽",
    concept:"A low-pass filter passes low frequencies and blocks high frequencies. An RC low-pass filter uses R in series and C in parallel with the load. The cutoff frequency (fc) defines where signal starts attenuating. Used in audio, power supplies, and communications.",

  { n:38, cat:"Circuits", title:"High Pass Filters",                          diff:"Intermediate", time:25, emoji:"🔼",
    concept:"A high-pass filter passes high frequencies and blocks low/DC frequencies. The RC high-pass filter has C in series and R in parallel. Used to remove DC offset, separate audio treble, and in differentiation circuits.",
    formula:"fc = 1/(2πRC)  |  Roll-off: +20dB/decade",
    activity:"Use an RC high-pass filter to block the 'hum' (50/60Hz) from an audio signal while preserving treble.",

  { n:39, cat:"Circuits", title:"Rectifier Circuits",                         diff:"Intermediate", time:25, emoji:"🔄",
    concept:"Rectifiers convert AC to DC. Half-wave: one diode, 50% efficiency. Full-wave bridge: 4 diodes, ~99% efficiency. Adding a large filter capacitor smoothes the output ripple. This is the heart of every power supply adapter.",

  { n:40, cat:"Circuits", title:"Transistor Switch Circuit",                  diff:"Intermediate", time:25, emoji:"🔦",
    concept:"A transistor switch controls high-power loads with low-power signals. When base voltage > V_BE(0.7V), transistor saturates (ON). When base is 0V, transistor cuts off (OFF). Add a base resistor to limit base current. Used for motor, relay, and LED control.",

  { n:41, cat:"Circuits", title:"Amplifier Circuits",                         diff:"Advanced", time:30, emoji:"📣",

  { n:42, cat:"Circuits", title:"Oscillator Circuits",                        diff:"Advanced", time:30, emoji:"〰️",

  { n:43, cat:"Circuits", title:"PWM — Pulse Width Modulation",               diff:"Intermediate", time:25, emoji:"📊",

  { n:44, cat:"Circuits", title:"Logic Gates",                                diff:"Intermediate", time:30, emoji:"🔀",

  { n:45, cat:"Circuits", title:"Flip-Flops & Memory",                       diff:"Advanced", time:30, emoji:"🔁",

  { n:46, cat:"Circuits", title:"Shift Registers",                            diff:"Advanced", time:25, emoji:"➡️",

  { n:47, cat:"Circuits", title:"I2C Communication",                         diff:"Intermediate", time:30, emoji:"🔗",

  { n:48, cat:"Circuits", title:"SPI Communication",                         diff:"Intermediate", time:25, emoji:"🔄",

  { n:49, cat:"Circuits", title:"UART / Serial Communication",               diff:"Intermediate", time:25, emoji:"💬",

  { n:50, cat:"Circuits", title:"ADC & DAC",                                  diff:"Intermediate", time:30, emoji:"🔢",

function generateCourse(age, level, goal) {
  let sessions = [...SESSION_DATA];
  // Adaptive: filter by difficulty based on user profile
  const levelMap = { Beginner: ["Beginner"], Intermediate: ["Beginner","Intermediate"], Advanced: ["Beginner","Intermediate","Advanced"] };
  const allowed = levelMap[level] || ["Beginner"];
  // Don't filter, but flag appropriate ones
  return sessions.map(s => ({
    ...s,
    recommended: allowed.includes(s.diff),
    xpReward: s.diff === "Beginner" ? 50 : s.diff === "Intermediate" ? 100 : 200,
  }));
}

// ============================================================
//  LEADERBOARD SCORING ALGORITHM
// ============================================================
function calculateLearningScore({ xp, completedSessions, quizAccuracy, streakDays }) {
  const progress = Math.min(completedSessions / 101, 1) * 400;
  const accuracy = (quizAccuracy || 0) * 3;
  const consistency = Math.min(streakDays, 30) * 10;
  return Math.round(progress + accuracy + consistency + (xp * 0.1));
}

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

const AppContext = createContext();

function AppProvider({ children }) {
  const [state, setState] = useState(() => {
    const saved = loadState();
    return saved || {
      screen: 'auth',
      authMode: 'login',
      user: null,
      onboardStep: 0,
      sessions: [],
      currentSessionIdx: null,
      quizState: null,
      posts: initPosts(),
      theme: { accent: '#00e5ff', mode: 'dark' },
      toast: null,
      sidebarOpen: false,
      activePage: 'dashboard',
      activeTab: 0,
      selectedPost: null,
      confetti: false,
    };
  });

  const update = useCallback((patch) => {
    setState(prev => {
      const next = typeof patch === 'function' ? patch(prev) : { ...prev, ...patch };
      saveState(next);
      return next;
    });
  }, []);

  // Apply theme to CSS vars
  useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', state.theme.mode);
    root.style.setProperty('--accent', state.theme.accent);
  }, [state.theme]);

  // Auto-dismiss toast
  useEffect(() => {
    if (state.toast) {
      const t = setTimeout(() => update({ toast: null }), 3500);
      return () => clearTimeout(t);
    }
  }, [state.toast]);

  const showToast = (msg, type='success') => update({ toast: { msg, type } });

  return (
    <AppContext.Provider value={{ state, update, showToast }}>
      {children}
    </AppContext.Provider>
  );
}

function useApp() { return useContext(AppContext); }

  const avgAccuracy = user.quizScores?.length > 0
    ? Math.round(user.quizScores.reduce((a,b) => a+b, 0) / user.quizScores.length) : 0;

function SessionsPage() {
  const { state, update } = useApp();
  const { user, sessions, currentSessionIdx } = state;
  const [catFilter, setCatFilter] = useState('All');
  const cats = ['All', ...TOPICS.map(t => t.cat)];

  if (currentSessionIdx !== null && currentSessionIdx !== undefined) {
    return <SessionDetail idx={currentSessionIdx} />;
  }

  const filtered = catFilter === 'All' ? sessions : sessions.filter(s => s.cat === catFilter);

  return (
    <div className="page-content">
      <div className="section-head">
        <div className="section-title">📚 Your 101-Session Course</div>
        <div style={{fontSize:14,color:'var(--text2)'}}>
          {user?.completedSessions?.length || 0} / 101 completed
        </div>
      </div>

      <div className="cat-pills">
        {cats.map(c => (
          <button key={c} className={`cat-pill ${catFilter===c?'active':''}`} onClick={() => setCatFilter(c)}>{c}</button>
        ))}
      </div>

      <div>
        {filtered.map((s, i) => {
          const done = user?.completedSessions?.includes(s.n);
          const isNext = !done && (s.n === 1 || user?.completedSessions?.includes(s.n - 1));
          const locked = !done && !isNext && s.n > 1 && !user?.completedSessions?.includes(s.n - 1);
          return (
            <div key={s.n} className={`session-list-item ${done?'completed':''} ${locked?'locked':''}`}
              onClick={() => !locked && update({ currentSessionIdx: s.n - 1 })}>
              <div className={`session-num ${done?'done':isNext?'active':''}`}>
                {done ? '✓' : locked ? '🔒' : s.n}
              </div>
              <div className="session-info">
                <div className="session-name">{s.emoji} {s.title}</div>
                <div className="session-meta">
                  <span>{s.cat}</span>
                  <span>⏱ {s.time} min</span>
                  {done && <span style={{color:'var(--green)'}}>Completed</span>}
                  {isNext && <span style={{color:'var(--accent)'}}>▶ Next up</span>}
                  {locked && <span style={{color:'var(--text3)'}}>Complete previous session</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                <span className={`badge badge-${s.diff==='Beginner'?'green':s.diff==='Intermediate'?'yellow':'red'}`}>{s.diff}</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:done?'var(--green)':'var(--accent)'}}>+{s.xpReward} XP</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SessionDetail({ idx }) {
  const { state, update, showToast } = useApp();
  const { user, sessions } = state;
  const session = sessions[idx];
  const [tab, setTab] = useState(0);
  const [selectedOpt, setSelectedOpt] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const done = user?.completedSessions?.includes(session?.n);

  if (!session) return null;

  function submitQuiz() {
    if (selectedOpt === null) return;
    setSubmitted(true);
    const correct = selectedOpt === session.quiz.ans;
    const score = correct ? 100 : 40;

    if (!done) {
      const newCompleted = [...(user.completedSessions || []), session.n];
      const newScores = [...(user.quizScores || []), score];
      const newXP = (user.xp || 0) + session.xpReward + (correct ? 20 : 0);
      update({
        user: { ...user, completedSessions: newCompleted, quizScores: newScores, xp: newXP },
        confetti: correct,
      });
      if (correct) {
        setTimeout(() => update({ confetti: false }), 3000);
        showToast(`🎉 Correct! +${session.xpReward + 20} XP earned!`);
      } else {
        showToast('Almost! Check the answer and retry next time.', 'error');
      }
    }
  }

  const tabs = ['📖 Concept', '🔬 Activity', '❓ Quiz'];

  return (
    <div className="page-content">
      <button className="btn btn-ghost btn-sm" style={{marginBottom:16}} onClick={() => update({currentSessionIdx:null})}>
        ← Back to Course
      </button>

      <div className="session-header">
        <div className="session-number">Session {session.n} of 101 · {session.cat}</div>
        <div className="session-title">{session.emoji} {session.title}</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
          <span className={`badge badge-${session.diff==='Beginner'?'green':session.diff==='Intermediate'?'yellow':'red'}`}>{session.diff}</span>
          <span className="chip">⏱ {session.time} min</span>
          <span className="chip">⚡ {session.xpReward} XP</span>
          {done && <span className="badge badge-accent">✓ Completed</span>}
        </div>
      </div>

      <div className="tabs">
        {tabs.map((t,i) => (
          <button key={i} className={`tab ${tab===i?'active':''}`} onClick={() => setTab(i)}>{t}</button>
        ))}
      </div>

      {tab === 0 && (
        <div className="anim-fadein">
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:12,display:'flex',gap:8,alignItems:'center'}}>
              📖 Concept Explanation
            </div>
            <div className="concept-box">{session.concept}</div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text2)',marginBottom:8,marginTop:16}}>🔢 Key Formula</div>
            <div className="formula-box">{session.formula}</div>
          </div>

          <div className="card" style={{marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:12}}>🔌 Visual Diagram</div>
            <div className="circuit-svg">
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:72,marginBottom:8}}>{session.emoji}</div>
                <div style={{fontSize:13,color:'var(--text3)'}}>Circuit diagram for: {session.title}</div>
              </div>
            </div>
            <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',marginTop:8}}>
              💡 Build this on your breadboard using the component list for this topic
            </div>
          </div>

          <div style={{display:'flex',gap:12,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary" onClick={() => setTab(1)}>Next: Activity →</button>
          </div>
        </div>
      )}

      {tab === 1 && (
        <div className="anim-fadein">
          <div className="card">
            <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:16}}>🔬 Practical Activity</div>
            <div className="activity-box">
              <div className="activity-title">🛠️ Your Challenge</div>
              <div style={{fontSize:14,lineHeight:1.7}}>{session.activity}</div>
            </div>
            <div style={{marginTop:20}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text2)',marginBottom:12}}>📝 Activity Notes</div>
              <textarea className="input" rows={5} placeholder="Write your observations, results, or questions here..." style={{resize:'vertical'}} />
            </div>
            <div style={{display:'flex',gap:12,justifyContent:'flex-end',marginTop:16}}>
              <button className="btn btn-secondary" onClick={() => setTab(0)}>← Concept</button>
              <button className="btn btn-primary" onClick={() => setTab(2)}>Take Quiz →</button>
            </div>
          </div>
        </div>
      )}

      {tab === 2 && (
        <div className="anim-fadein">
          <div className="card">
            <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:20}}>❓ Mini Quiz</div>
            <div style={{fontSize:16,fontWeight:600,marginBottom:20,lineHeight:1.5}}>{session.quiz.q}</div>
            {session.quiz.opts.map((opt, i) => {
              let cls = 'quiz-option';
              if (submitted) {
                if (i === session.quiz.ans) cls += ' correct';
                else if (i === selectedOpt && i !== session.quiz.ans) cls += ' wrong';
              } else if (i === selectedOpt) {
                cls += ' selected';
              }
              return (
                <div key={i} className={cls} onClick={() => !submitted && setSelectedOpt(i)}>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:12,width:20,textAlign:'center',color:'var(--text3)',flexShrink:0}}>
                    {String.fromCharCode(65+i)}
                  </span>
                  {opt}
                  {submitted && i === session.quiz.ans && <span style={{marginLeft:'auto'}}>✓</span>}
                  {submitted && i === selectedOpt && i !== session.quiz.ans && <span style={{marginLeft:'auto'}}>✗</span>}
                </div>
              );
            })}

            {!submitted ? (
              <button className="btn btn-primary" style={{marginTop:16}} onClick={submitQuiz} disabled={selectedOpt===null}>
                Submit Answer
              </button>
            ) : (
              <div style={{marginTop:16}}>
                {selectedOpt === session.quiz.ans ? (
                  <div style={{padding:'16px',background:'rgba(0,230,118,0.1)',border:'1px solid rgba(0,230,118,0.2)',borderRadius:'var(--radius-sm)',color:'var(--green)',fontWeight:600}}>
                    🎉 Correct! You've mastered this concept!
                  </div>
                ) : (
                  <div style={{padding:'16px',background:'rgba(255,23,68,0.1)',border:'1px solid rgba(255,23,68,0.2)',borderRadius:'var(--radius-sm)',color:'var(--red)'}}>
                    ❌ Not quite — the correct answer was option {String.fromCharCode(65+session.quiz.ans)}: {session.quiz.opts[session.quiz.ans]}
                  </div>
                )}
                {idx < sessions.length - 1 && (
                  <button className="btn btn-primary" style={{marginTop:16}} onClick={() => {
                    update({ currentSessionIdx: idx + 1 });
                    setTab(0); setSelectedOpt(null); setSubmitted(false);
                  }}>
                    Next Session →
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function DiscussionPage() {
  const { state, update, showToast } = useApp();
  const { posts, user } = state;
  const [room, setRoom] = useState('All');
  const [newPost, setNewPost] = useState('');
  const [replyTo, setReplyTo] = useState(null);
  const [replyText, setReplyText] = useState('');
  const rooms = ['All', ...TOPICS.map(t => t.cat)];

  const filtered = room === 'All' ? posts : posts.filter(p => p.roomId === room);

  function addPost() {
    if (!newPost.trim()) return;
    const post = {
      id: Date.now(), userId: user.id, userName: user.name,
      avatar: user.name?.charAt(0) || 'U',
      roomId: room === 'All' ? 'General' : room,
      content: newPost, upvotes: 0, replies: [],
      createdAt: Date.now()
    };
    update({ posts: [post, ...posts] });
    setNewPost('');
    showToast('Post published!');
  }

  function addReply(postId) {
    if (!replyText.trim()) return;
    const reply = { id: Date.now(), userId: user.id, userName: user.name, avatar: user.name?.charAt(0)||'U', content: replyText, upvotes: 0, createdAt: Date.now() };
    update({ posts: posts.map(p => p.id === postId ? {...p, replies:[...p.replies, reply]} : p) });
    setReplyTo(null); setReplyText('');
    showToast('Reply added!');
  }

  function upvote(postId, replyId=null) {
    update({ posts: posts.map(p => {
      if (p.id !== postId) return p;
      if (!replyId) return {...p, upvotes: p.upvotes + 1};
      return {...p, replies: p.replies.map(r => r.id===replyId ? {...r, upvotes:r.upvotes+1} : r)};
    })});
  }

  function timeAgo(ts) {
    const s = Math.floor((Date.now()-ts)/1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  return (
    <div className="page-content">
      <div className="section-head">
        <div className="section-title">💬 Community Discussion</div>
        <span className="badge badge-green">🟢 Live</span>
      </div>

      {/* Room Filter */}
      <div className="cat-pills">
        {rooms.map(r => (
          <button key={r} className={`cat-pill ${room===r?'active':''}`} onClick={() => setRoom(r)}>{r}</button>
        ))}
      </div>

      {/* New Post */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{fontWeight:600,marginBottom:12,fontSize:14}}>Ask a Question or Share Something</div>
        <textarea className="input" rows={3} placeholder={`Post in ${room === 'All' ? 'General' : room}...`} value={newPost} onChange={e => setNewPost(e.target.value)} style={{resize:'vertical',marginBottom:12}} />
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-primary btn-sm" onClick={addPost}>Post →</button>
        </div>
      </div>

      {/* Posts */}
      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">💬</div>
          <div className="empty-title">No discussions yet</div>
          <div className="empty-sub">Be the first to post in this room!</div>
        </div>
      ) : filtered.map(post => (
        <div key={post.id} className="post-card">
          <div className="post-header">
            <div className="avatar">{post.avatar}</div>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{post.userName}</div>
              <div className="post-meta">{post.roomId} · {timeAgo(post.createdAt)}</div>
            </div>
          </div>
          <div style={{fontSize:14,lineHeight:1.6}}>{post.content}</div>
          <div className="post-actions">
            <button className="post-action-btn" onClick={() => upvote(post.id)}>▲ {post.upvotes}</button>
            <button className="post-action-btn" onClick={() => setReplyTo(replyTo===post.id?null:post.id)}>💬 {post.replies.length} Replies</button>
          </div>

          {/* Replies */}
          {post.replies.length > 0 && (
            <div style={{marginTop:12,paddingLeft:16,borderLeft:'2px solid var(--border)'}}>
              {post.replies.map(r => (
                <div key={r.id} style={{marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <div className="avatar" style={{width:24,height:24,fontSize:11}}>{r.avatar}</div>
                    <span style={{fontSize:13,fontWeight:600}}>{r.userName}</span>
                    <span className="post-meta">{timeAgo(r.createdAt)}</span>
                  </div>
                  <div style={{fontSize:13,lineHeight:1.6,marginLeft:32}}>{r.content}</div>
                  <button className="post-action-btn" style={{marginLeft:32,marginTop:4}} onClick={() => upvote(post.id, r.id)}>▲ {r.upvotes}</button>
                </div>
              ))}
            </div>
          )}

          {/* Reply Box */}
          {replyTo === post.id && (
            <div style={{marginTop:12}}>
              <textarea className="input" rows={2} placeholder="Write a reply..." value={replyText} onChange={e => setReplyText(e.target.value)} style={{resize:'none',marginBottom:8}} />
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={() => addReply(post.id)}>Reply</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setReplyTo(null)}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ============================================================
//  LEADERBOARD PAGE
// ============================================================
function LeaderboardPage() {
  const { state } = useApp();
  const { user } = state;
  const [tab, setTab] = useState(0);
  const tabs = ['🌍 Global', '📅 Weekly', '👥 Age Group'];

  // Build leaderboard with current user injected
  const userScore = calculateLearningScore({
    xp: user?.xp || 0,
    completedSessions: user?.completedSessions?.length || 0,
    quizAccuracy: user?.quizScores?.length > 0 ? Math.round(user.quizScores.reduce((a,b)=>a+b,0)/user.quizScores.length) : 0,
    streakDays: user?.streak || 0,
  });

  const board = [
    ...MOCK_USERS.map((u,i) => ({ ...u, score: calculateLearningScore({xp:u.xp,completedSessions:u.completed,quizAccuracy:u.accuracy,streakDays:u.streak}), isMe:false })),
    { name: user?.name || 'You', xp: user?.xp||0, completed: user?.completedSessions?.length||0, accuracy: 80, streak: user?.streak||0, score: userScore, isMe: true, age: user?.age||20 }
  ].sort((a,b) => b.score - a.score);

  const weeklyBoard = [...board].sort((a,b) => b.xp - a.xp);
  const userAge = user?.age || 20;
  const ageGroupBoard = board.filter(u => Math.abs(u.age - userAge) <= 10);

  const boards = [board, weeklyBoard, ageGroupBoard];
  const current = boards[tab];

  function rankIcon(i) {
    if (i === 0) return { cls:'gold', icon:'🥇' };
    if (i === 1) return { cls:'silver', icon:'🥈' };
    if (i === 2) return { cls:'bronze', icon:'🥉' };
    return { cls:'', icon: null };
  }

  const myRank = current.findIndex(u => u.isMe) + 1;

  return (
    <div className="page-content">
      <div className="section-head">
        <div className="section-title">🏆 Leaderboard</div>
        <div style={{fontSize:14,color:'var(--text2)'}}>Your rank: #{myRank}</div>
      </div>

      {/* Score Algorithm Explanation */}
      <div className="card card-accent" style={{marginBottom:24}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:8,color:'var(--accent)'}}>📊 Learning Score Formula</div>
        <div className="formula-box" style={{fontSize:13}}>
          Score = (Sessions/101 × 400) + (Quiz Accuracy × 3) + (Streak Days × 10) + (XP × 0.1)
        </div>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:8}}>Consistency and accuracy matter more than speed alone!</div>
      </div>

      <div className="tabs">
        {tabs.map((t,i) => <button key={i} className={`tab ${tab===i?'active':''}`} onClick={() => setTab(i)}>{t}</button>)}
      </div>

      {/* My Position */}
      <div className="card" style={{marginBottom:16,borderColor:'rgba(0,229,255,0.3)'}}>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'1px',fontWeight:600}}>Your Position</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:28,fontWeight:700,color:'var(--accent)',minWidth:60}}>#{myRank}</div>
          <div className="avatar" style={{width:44,height:44,fontSize:18}}>{user?.name?.charAt(0)||'U'}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700}}>{user?.name}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Score: {userScore.toLocaleString()} · {user?.completedSessions?.length||0} sessions · 🔥{user?.streak}d</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:'var(--accent)'}}>{userScore.toLocaleString()}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>points</div>
          </div>
        </div>
      </div>

      {/* Leaderboard List */}
      <div className="card">
        {current.slice(0,10).map((entry, i) => {
          const { cls, icon } = rankIcon(i);
          return (
            <div key={i} className={`rank-row ${entry.isMe?'me':''}`}>
              <div className={`rank-num ${cls}`}>{icon || `#${i+1}`}</div>
              <div className="avatar">{entry.name.charAt(0)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600}}>{entry.name} {entry.isMe && <span className="badge badge-accent" style={{fontSize:10}}>YOU</span>}</div>
                <div style={{fontSize:12,color:'var(--text2)'}}>
                  {entry.completed} sessions · {entry.accuracy}% accuracy · 🔥{entry.streak}d
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:i<3?['var(--yellow)','var(--text2)','var(--accent2)'][i]:'var(--text)'}}>
                  {entry.score.toLocaleString()}
                </div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{entry.xp.toLocaleString()} XP</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
//  SETTINGS PAGE (Theme Customization)
// ============================================================
function SettingsPage() {
  const { state, update, showToast } = useApp();
  const { user, theme } = state;
  const accents = [
    '#00e5ff','#00e676','#ffd600','#ff6b35','#d500f9','#ff1744','#2979ff','#ff6d00','#00bfa5','#aa00ff',
  ];

  function setAccent(color) {
    const newTheme = { ...theme, accent: color };
    update({ theme: newTheme, user: { ...user, theme: newTheme } });
    showToast('Theme updated!');
  }
  function setMode(mode) {
    const newTheme = { ...theme, mode };
    update({ theme: newTheme, user: { ...user, theme: newTheme } });
    showToast(`${mode === 'dark' ? '🌙 Dark' : '☀️ Light'} mode enabled!`);
  }

  return (
    <div className="page-content">
      <div className="grid-2" style={{gap:24,alignItems:'start'}}>
        {/* Profile */}
        <div>
          <div className="section">
            <div className="section-title" style={{marginBottom:16}}>👤 Profile</div>
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
                <div className="avatar" style={{width:64,height:64,fontSize:28}}>{user?.name?.charAt(0)||'U'}</div>
                <div>
                  <div style={{fontSize:20,fontWeight:700}}>{user?.name}</div>
                  <div style={{fontSize:14,color:'var(--text2)'}}>{user?.email}</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {[
                  { label:'Age', val:user?.age || 'Not set' },
                  { label:'Level', val:user?.level || 'Not set' },
                  { label:'Goal', val:user?.goal || 'Not set' },
                  { label:'Joined', val:user?.joined || 'Today' },
                  { label:'XP Earned', val:(user?.xp||0).toLocaleString() },
                  { label:'Sessions', val:`${user?.completedSessions?.length||0} / 101` },
                ].map(item => (
                  <div key={item.label} style={{background:'var(--bg3)',padding:12,borderRadius:8}}>
                    <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}}>{item.label}</div>
                    <div style={{fontWeight:600,fontSize:14}}>{item.val}</div>
                  </div>
                ))}
              </div>
              <button className="btn btn-secondary" style={{marginTop:16,width:'100%',justifyContent:'center'}} onClick={() => update({screen:'onboard',onboardStep:0})}>
                🔄 Redo Setup
              </button>
            </div>
          </div>
        </div>

        {/* Theme */}
        <div>
          <div className="section">
            <div className="section-title" style={{marginBottom:16}}>🎨 Theme Customization</div>
            <div className="card">
              <div style={{marginBottom:20}}>
                <div className="label" style={{marginBottom:10}}>Display Mode</div>
                <div style={{display:'flex',gap:10}}>
                  <button className={`btn ${theme.mode==='dark'?'btn-primary':'btn-secondary'}`} onClick={() => setMode('dark')}>🌙 Dark</button>
                  <button className={`btn ${theme.mode==='light'?'btn-primary':'btn-secondary'}`} onClick={() => setMode('light')}>☀️ Light</button>
                </div>
              </div>
              <div>
                <div className="label" style={{marginBottom:12}}>Accent Color</div>
                <div className="swatches">
                  {accents.map(c => (
                    <div key={c} className={`color-swatch ${theme.accent===c?'active':''}`}
                      style={{background:c,boxShadow:theme.accent===c?`0 0 0 2px var(--bg),0 0 0 4px ${c}`:'none'}}
                      onClick={() => setAccent(c)} />
                  ))}
                </div>
                <div style={{marginTop:16,display:'flex',gap:12,alignItems:'center'}}>
                  <div style={{fontSize:13,color:'var(--text2)'}}>Or pick custom:</div>
                  <input type="color" value={theme.accent} onChange={e => setAccent(e.target.value)}
                    style={{width:40,height:32,border:'none',borderRadius:6,cursor:'pointer',background:'none'}} />
                </div>
              </div>
              <div className="divider" />
              <div style={{fontSize:14,color:'var(--text2)'}}>Preview:</div>
              <div style={{marginTop:12,display:'flex',gap:10,flexWrap:'wrap'}}>
                <button className="btn btn-primary">Primary Button</button>
                <span className="badge badge-accent">Badge</span>
                <div className="progress-wrap" style={{flex:1,minWidth:100}}>
                  <div className="progress-fill" style={{width:'65%'}} />
                </div>
              </div>
            </div>
          </div>

          <div className="section">
            <div className="section-title" style={{marginBottom:16}}>🔔 Preferences</div>
            <div className="card">
              {[
                { label:'Daily Reminder', desc:'Get notified to maintain streak', val:true },
                { label:'Quiz Hints', desc:'Show hints for difficult questions', val:false },
                { label:'Sound Effects', desc:'Play sounds on completion', val:true },
              ].map(pref => (
                <div key={pref.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600}}>{pref.label}</div>
                    <div style={{fontSize:12,color:'var(--text3)'}}>{pref.desc}</div>
                  </div>
                  <div style={{width:44,height:24,borderRadius:12,background:pref.val?'var(--accent)':'var(--bg3)',cursor:'pointer',position:'relative',transition:'background 0.2s'}}>
                    <div style={{width:20,height:20,background:'white',borderRadius:'50%',position:'absolute',top:2,left:pref.val?22:2,transition:'left 0.2s'}} />
                  </div>
                </div>
              ))}
              <button className="btn btn-danger" style={{marginTop:16,width:'100%',justifyContent:'center'}} onClick={() => {
                localStorage.removeItem(STORAGE_KEY);
                update({ user:null, screen:'auth' });
              }}>
                🗑️ Reset All Data
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  TOAST NOTIFICATION
// ============================================================
function Toast() {
  const { state } = useApp();
  if (!state.toast) return null;
  const { msg, type } = state.toast;
  return (
    <div className={`toast ${type}`}>
      <span>{type === 'success' ? '✅' : '❌'}</span>
      <span>{msg}</span>
    </div>
  );
}

// ============================================================
//  CONFETTI CELEBRATION
// ============================================================
function Confetti() {
  const { state } = useApp();
  if (!state.confetti) return null;
  return (
    <div className="confetti-overlay">
      <div className="confetti-text">🎉 CORRECT! 🎉</div>
      <div style={{fontSize:20,color:'var(--text2)'}}>+XP earned! Keep it up!</div>
    </div>
  );
}

// ============================================================
//  MAIN APP
// ============================================================
function MainApp() {
  const { state } = useApp();
  const pages = {
    dashboard: <Dashboard />,
    sessions: <SessionsPage />,
    projects: <ProjectsPage />,
    tools: <ToolsPage />,
    discussion: <DiscussionPage />,
    leaderboard: <LeaderboardPage />,
    settings: <SettingsPage />,
  };

  return (
    <div className="app-shell">
      <Sidebar />
      <div className="main-content">
        <Topbar />
        {pages[state.activePage] || <Dashboard />}
      </div>
      <Toast />
      <Confetti />
    </div>
  );
}

// ============================================================
//  ROOT ROUTER
// ============================================================
function App() {
  const { state } = useApp();
  switch(state.screen) {
    case 'auth':    return <AuthPage />;
    case 'onboard': return <OnboardPage />;
    case 'app':     return <MainApp />;
    default:        return <AuthPage />;
  }
}

// ============================================================
//  MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppProvider><App /></AppProvider>);
</script>
